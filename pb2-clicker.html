<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ПБ2 — Кликер</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #FF6B1A;
      --orange-dim: #cc4f0d;
      --orange-glow: rgba(255, 107, 26, 0.25);
      --bg: #0a0a0a;
      --bg2: #111111;
      --border: rgba(255,107,26,0.2);
      --text: #f0ede8;
      --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--orange);
      letter-spacing: 4px;
      line-height: 1;
      text-shadow: 0 0 40px var(--orange-glow);
    }

    .logo span {
      color: var(--text);
    }

    .header-tag {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 60px 24px;
    }

    /* Counter */
    .counter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #counter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 140px;
      line-height: 1;
      color: var(--text);
      letter-spacing: -4px;
      transition: color 0.3s, text-shadow 0.3s;
    }

    #counter.done {
      color: var(--orange);
      text-shadow: 0 0 60px var(--orange-glow);
    }

    .goal-text {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Progress */
    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--orange);
      border-radius: 2px;
      transition: width 0.1s ease;
      box-shadow: 0 0 12px var(--orange-glow);
    }

    /* Timer */
    #timer-display {
      font-size: 28px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 2px;
      transition: color 0.3s;
    }

    #timer-display.running { color: var(--text); }
    #timer-display.done { color: var(--orange); }

    /* Button */
    .btn-wrap {
      position: relative;
    }

    .btn-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid var(--border);
      animation: pulse-ring 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.04); }
    }

    #click-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 2px solid var(--orange);
      background: transparent;
      color: var(--orange);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.07s, box-shadow 0.15s;
      position: relative;
      z-index: 1;
    }

    #click-btn:hover:not(:disabled) {
      background: var(--orange);
      color: #0a0a0a;
      box-shadow: 0 0 40px var(--orange-glow);
    }

    #click-btn:active:not(:disabled) {
      transform: scale(0.88);
    }

    #click-btn:disabled {
      border-color: var(--orange);
      background: var(--orange);
      color: #0a0a0a;
      cursor: not-allowed;
    }

    /* Status */
    #status {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      min-height: 18px;
      text-align: center;
    }

    #status.done {
      color: var(--orange);
      font-weight: 700;
    }

    /* Reset */
    #reset-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 10px 28px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: none;
      transition: border-color 0.15s, color 0.15s;
    }

    #reset-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    /* Divider lines */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* Footer */
    footer {
      width: 100%;
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--orange);
      letter-spacing: 3px;
    }

    .footer-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* click burst animation */
    @keyframes burst {
      0% { opacity: 1; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(2.5); }
    }

    .burst {
      position: fixed;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--orange);
      pointer-events: none;
      animation: burst 0.4s ease-out forwards;
      transform-origin: center;
      z-index: 999;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">ПБ<span style="color:var(--orange)">2</span></div>
    <div class="header-tag">Кликер / v1.0</div>
  </header>

  <main>
    <div class="counter-wrap">
      <div id="counter">0</div>
      <div class="goal-text">цель — 67 кликов</div>
    </div>

    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>

    <div id="timer-display">00:00.0</div>

    <div class="btn-wrap">
      <div class="btn-ring"></div>
      <button id="click-btn">КЛИК</button>
    </div>

    <div id="status">Нажми, чтобы начать</div>

    <button id="reset-btn">↺ сначала</button>
  </main>

  <footer>
    <div class="footer-logo">ПБ2</div>
    <div class="footer-text">67 кликов · таймер · рекорд</div>
  </footer>

  <script>
    const GOAL = 67;
    let clicks = 0, running = false, done = false, startTime = null, rafId = null;

    const counter = document.getElementById('counter');
    const fill = document.getElementById('progress-fill');
    const btn = document.getElementById('click-btn');
    const timerDisplay = document.getElementById('timer-display');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');

    function formatTime(ms) {
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const t = Math.floor((ms % 1000) / 100);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${t}`;
    }

    function tickTimer(ts) {
      if (!startTime) startTime = ts;
      timerDisplay.textContent = formatTime(ts - startTime);
      if (running) rafId = requestAnimationFrame(tickTimer);
    }

    function spawnBurst(e) {
      const b = document.createElement('div');
      b.className = 'burst';
      b.style.left = (e.clientX - 40) + 'px';
      b.style.top  = (e.clientY - 40) + 'px';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 400);
    }

    btn.addEventListener('click', (e) => {
      if (done) return;
      spawnBurst(e);

      if (!running) {
        running = true;
        startTime = null;
        status.textContent = 'Кликай!';
        timerDisplay.classList.add('running');
        rafId = requestAnimationFrame(tickTimer);
      }

      clicks++;
      counter.textContent = clicks;
      fill.style.width = Math.min(clicks / GOAL * 100, 100) + '%';

      if (clicks >= GOAL) {
        running = false;
        done = true;
        cancelAnimationFrame(rafId);
        const finalTime = timerDisplay.textContent;
        counter.classList.add('done');
        timerDisplay.classList.remove('running');
        timerDisplay.classList.add('done');
        btn.disabled = true;
        btn.textContent = '67!';
        status.textContent = `Готово за ${finalTime}!`;
        status.classList.add('done');
        resetBtn.style.display = 'inline-block';
      }
    });

    resetBtn.addEventListener('click', () => {
      cancelAnimationFrame(rafId);
      clicks = 0; running = false; done = false; startTime = null;
      counter.textContent = '0';
      counter.classList.remove('done');
      fill.style.width = '0%';
      timerDisplay.textContent = '00:00.0';
      timerDisplay.classList.remove('running','done');
      btn.disabled = false;
      btn.textContent = 'КЛИК';
      status.textContent = 'Нажми, чтобы начать';
      status.classList.remove('done');
      resetBtn.style.display = 'none';
    });
  </script>

</body>
</html>

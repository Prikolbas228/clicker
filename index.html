<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ПБ2 — Кликер</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --orange: #FF6B1A;
      --orange-glow: rgba(255,107,26,0.22);
      --bg: #0a0a0a;
      --bg2: #131313;
      --border: rgba(255,107,26,0.18);
      --border2: rgba(255,255,255,0.08);
      --text: #f0ede8;
      --muted: #555;
      --muted2: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; }

    header { width: 100%; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 46px; color: var(--text); letter-spacing: 4px; line-height: 1; }
    .logo em { color: var(--orange); font-style: normal; }
    .header-meta { text-align: right; display: flex; flex-direction: column; gap: 4px; }
    .header-tag { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    #record-line { font-size: 11px; color: var(--orange); letter-spacing: 1px; min-height: 16px; }

    .screen { display: none; flex: 1; width: 100%; max-width: 480px; margin: 0 auto; padding: 52px 24px; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    .screen.active { display: flex; }

    /* FORM */
    .screen-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 3px; color: var(--text); text-align: center; }
    .screen-title em { color: var(--orange); font-style: normal; }

    .fields { width: 100%; display: flex; flex-direction: column; gap: 20px; }
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-group label { font-size: 10px; letter-spacing: 3px; color: var(--muted2); text-transform: uppercase; }

    .input-wrap { position: relative; }
    .input-wrap .placeholder-hint {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-family: 'IBM Plex Mono', monospace; font-size: 18px;
      color: var(--muted); pointer-events: none; letter-spacing: 1px;
      transition: opacity 0.15s;
    }
    .input-wrap input:not(:placeholder-shown) + .placeholder-hint,
    .input-wrap input:focus + .placeholder-hint { opacity: 0; }

    .field-group input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 2px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
      font-size: 18px; padding: 14px 16px; outline: none;
      transition: border-color 0.2s; letter-spacing: 1px;
    }
    .field-group input:focus { border-color: var(--orange); }
    .field-group input::placeholder { color: transparent; }

    /* пример-подсказка под полем */
    .field-hint { font-size: 11px; color: var(--muted); letter-spacing: 1px; padding-left: 2px; }
    .field-error { font-size: 11px; color: #ff5555; letter-spacing: 1px; min-height: 15px; }

    /* BUTTONS */
    .btn-primary {
      width: 100%; padding: 16px; background: var(--orange); border: none; border-radius: 2px;
      color: #0a0a0a; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px;
      cursor: pointer; transition: background 0.15s, transform 0.07s;
    }
    .btn-primary:hover { background: #ff8040; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-outline {
      padding: 10px 24px; background: transparent; border: 1px solid var(--border2); border-radius: 2px;
      color: var(--muted2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-outline:hover { border-color: var(--orange); color: var(--orange); }

    /* GAME */
    .player-info { font-size: 12px; letter-spacing: 2px; color: var(--muted2); text-align: center; }
    .player-info span { color: var(--orange); }

    #counter { font-family: 'Bebas Neue', sans-serif; font-size: 130px; line-height: 1; color: var(--text); letter-spacing: -4px; transition: color 0.3s; }
    #counter.done { color: var(--orange); text-shadow: 0 0 60px var(--orange-glow); }
    .goal-label { font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

    .progress-track { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    #progress-fill { height: 100%; width: 0%; background: var(--orange); border-radius: 2px; transition: width 0.08s ease; box-shadow: 0 0 10px var(--orange-glow); }

    #timer-display { font-size: 26px; font-weight: 700; color: var(--muted); letter-spacing: 2px; transition: color 0.3s; }
    #timer-display.running { color: var(--text); }
    #timer-display.done { color: var(--orange); }

    .btn-ring-wrap { position: relative; }
    .btn-ring { position: absolute; inset: -14px; border-radius: 50%; border: 1px solid var(--border); animation: pulse 2s ease-in-out infinite; pointer-events: none; }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.9;transform:scale(1.05)} }

    #click-btn {
      width: 148px; height: 148px; border-radius: 50%; border: 2px solid var(--orange);
      background: transparent; color: var(--orange); font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 4px; cursor: pointer;
      transition: background .12s, color .12s, transform .07s, box-shadow .15s;
      position: relative; z-index: 1;
    }
    #click-btn:hover:not(:disabled) { background: var(--orange); color: #0a0a0a; box-shadow: 0 0 36px var(--orange-glow); }
    #click-btn:active:not(:disabled) { transform: scale(0.88); }
    #click-btn:disabled { background: var(--orange); color: #0a0a0a; cursor: not-allowed; }

    #status { font-size: 12px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; min-height: 18px; text-align: center; }
    #status.done { color: var(--orange); font-weight: 700; }
    .game-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    /* STATS */
    .stats-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: var(--text); text-align: center; }
    .stats-title em { color: var(--orange); font-style: normal; }
    .stats-count { font-size: 11px; letter-spacing: 2px; color: var(--muted2); }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stats-table thead tr { border-bottom: 1px solid var(--border); }
    .stats-table th { padding: 10px 10px; text-align: left; font-size: 10px; letter-spacing: 2px; color: var(--muted2); text-transform: uppercase; font-weight: 400; white-space: nowrap; }
    .stats-table td { padding: 10px 10px; border-bottom: 1px solid var(--border2); color: var(--text); letter-spacing: 1px; white-space: nowrap; }
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table .best-row td { color: var(--orange); }
    .stats-table td.time-col { font-weight: 700; }
    .stats-empty { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-align: center; padding: 32px 0; }
    .stats-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    footer { width: 100%; padding: 18px 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--orange); letter-spacing: 3px; }
    .footer-text { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    @keyframes burst { 0%{opacity:.7;transform:scale(.4)} 100%{opacity:0;transform:scale(2.2)} }
    .burst { position: fixed; width: 70px; height: 70px; border-radius: 50%; border: 1.5px solid var(--orange); pointer-events: none; animation: burst .35s ease-out forwards; z-index: 9999; }
  </style>
</head>
<body>

<header>
  <div class="logo">ПБ<em>2</em></div>
  <div class="header-meta">
    <div class="header-tag">Кликер / v2.0</div>
    <div id="record-line"></div>
  </div>
</header>

<!-- FORM -->
<div class="screen active" id="screen-form">
  <div class="screen-title">Введи данные<br>перед <em>игрой</em></div>

  <div class="fields">
    <div class="field-group">
      <label>Имя</label>
      <div class="input-wrap">
        <input type="text" id="input-name" placeholder=" " autocomplete="off" maxlength="40"/>
        <span class="placeholder-hint">Иван</span>
      </div>
      <div class="field-hint">например: Иван</div>
      <div class="field-error" id="err-name"></div>
    </div>

    <div class="field-group">
      <label>Телефон</label>
      <div class="input-wrap">
        <input type="tel" id="input-phone" placeholder=" " autocomplete="off" maxlength="20"/>
        <span class="placeholder-hint">+7 999 123 45 67</span>
      </div>
      <div class="field-hint">например: +7 999 123 45 67</div>
      <div class="field-error" id="err-phone"></div>
    </div>
  </div>

  <button class="btn-primary" id="btn-start-game">НАЧАТЬ ИГРУ</button>
  <button class="btn-outline" id="btn-goto-stats">Посмотреть статистику →</button>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="player-info" id="player-info"></div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div id="counter">0</div>
    <div class="goal-label">цель — 67 кликов</div>
  </div>

  <div class="progress-track"><div id="progress-fill"></div></div>
  <div id="timer-display">00:00.0</div>

  <div class="btn-ring-wrap">
    <div class="btn-ring"></div>
    <button id="click-btn">КЛИК</button>
  </div>

  <div id="status">Нажми, чтобы начать</div>

  <div class="game-actions" id="game-actions" style="display:none">
    <button class="btn-outline" id="btn-play-again">↺ Ещё раз</button>
    <button class="btn-outline" id="btn-change-player">Сменить игрока</button>
    <button class="btn-outline" id="btn-goto-stats2">Статистика →</button>
  </div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="stats-title">Статистика <em>ПБ2</em></div>
  <div class="stats-count" id="stats-count"></div>
  <div id="stats-container" style="width:100%;overflow-x:auto;max-height:360px;overflow-y:auto"></div>
  <div class="stats-actions">
    <button class="btn-primary" id="btn-export-xlsx" style="width:auto;padding:14px 28px;font-size:18px">⬇ Скачать Excel</button>
    <button class="btn-outline" id="btn-back-form">← Назад</button>
    <button class="btn-outline" id="btn-clear-stats">Очистить всё</button>
  </div>
</div>

<footer>
  <div class="footer-logo">ПБ2</div>
  <div class="footer-text">67 кликов · статистика · excel</div>
</footer>

<script>
  const GOAL = 67;
  const STORAGE_KEY = 'pb2_stats_v3';

  let currentPlayer = { name: '', phone: '' };
  let clicks = 0, running = false, done = false, startTime = null, rafId = null, gameStartTs = null;

  const inputName  = document.getElementById('input-name');
  const inputPhone = document.getElementById('input-phone');
  const errName    = document.getElementById('err-name');
  const errPhone   = document.getElementById('err-phone');
  const counter      = document.getElementById('counter');
  const progressFill = document.getElementById('progress-fill');
  const timerDisplay = document.getElementById('timer-display');
  const clickBtn     = document.getElementById('click-btn');
  const statusEl     = document.getElementById('status');
  const gameActions  = document.getElementById('game-actions');
  const playerInfo   = document.getElementById('player-info');
  const recordLine   = document.getElementById('record-line');
  const statsContainer = document.getElementById('stats-container');
  const statsCount   = document.getElementById('stats-count');

  function loadStats() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
  function saveStats(a) { localStorage.setItem(STORAGE_KEY, JSON.stringify(a)); }
  function addResult(e) { const a = loadStats(); a.push(e); saveStats(a); }

  function updateRecordLine() {
    const arr = loadStats();
    if (!arr.length) { recordLine.textContent = ''; return; }
    const best = arr.reduce((a,b) => a.ms < b.ms ? a : b);
    recordLine.textContent = `Рекорд: ${best.name} — ${best.time}`;
  }
  updateRecordLine();

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatPhone(val) {
    // убираем всё кроме цифр и +
    return val.replace(/[^\d+\s\-()]/g, '');
  }

  inputPhone.addEventListener('input', () => {
    inputPhone.value = formatPhone(inputPhone.value);
  });

  // Form submit
  document.getElementById('btn-start-game').addEventListener('click', () => {
    const name  = inputName.value.trim();
    const phone = inputPhone.value.trim();
    errName.textContent = ''; errPhone.textContent = '';
    let ok = true;
    if (!name)  { errName.textContent  = 'Введи имя'; ok = false; }
    if (!phone) { errPhone.textContent = 'Введи телефон'; ok = false; }
    else if (phone.replace(/\D/g,'').length < 7) { errPhone.textContent = 'Слишком короткий номер'; ok = false; }
    if (!ok) return;

    currentPlayer = { name, phone };
    playerInfo.innerHTML = `<span>${escHtml(name)}</span> · ${escHtml(phone)}`;
    resetGame();
    showScreen('game');
  });

  [inputName, inputPhone].forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-start-game').click(); });
  });

  document.getElementById('btn-goto-stats').addEventListener('click', () => { renderStats(); showScreen('stats'); });

  // Game
  function formatTime(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const t = Math.floor((ms % 1000) / 100);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${t}`;
  }

  function tickTimer(ts) {
    if (!startTime) startTime = ts;
    timerDisplay.textContent = formatTime(ts - startTime);
    if (running) rafId = requestAnimationFrame(tickTimer);
  }

  function resetGame() {
    if (rafId) cancelAnimationFrame(rafId);
    clicks = 0; running = false; done = false; startTime = null; gameStartTs = null;
    counter.textContent = '0';
    counter.classList.remove('done');
    progressFill.style.width = '0%';
    timerDisplay.textContent = '00:00.0';
    timerDisplay.classList.remove('running','done');
    clickBtn.disabled = false; clickBtn.textContent = 'КЛИК';
    statusEl.textContent = 'Нажми, чтобы начать';
    statusEl.classList.remove('done');
    gameActions.style.display = 'none';
  }

  function spawnBurst(e) {
    const b = document.createElement('div');
    b.className = 'burst';
    b.style.left = (e.clientX - 35) + 'px';
    b.style.top  = (e.clientY - 35) + 'px';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 400);
  }

  clickBtn.addEventListener('click', (e) => {
    if (done) return;
    spawnBurst(e);
    if (!running) {
      running = true; startTime = null; gameStartTs = performance.now();
      statusEl.textContent = 'Кликай!';
      timerDisplay.classList.add('running');
      rafId = requestAnimationFrame(tickTimer);
    }
    clicks++;
    counter.textContent = clicks;
    progressFill.style.width = Math.min(clicks / GOAL * 100, 100) + '%';

    if (clicks >= GOAL) {
      running = false; done = true;
      cancelAnimationFrame(rafId);
      const ms = Math.round(performance.now() - gameStartTs);
      const finalTime = formatTime(ms);
      timerDisplay.textContent = finalTime;
      counter.classList.add('done');
      timerDisplay.classList.remove('running'); timerDisplay.classList.add('done');
      clickBtn.disabled = true; clickBtn.textContent = '67!';
      statusEl.textContent = `Готово за ${finalTime}!`;
      statusEl.classList.add('done');
      gameActions.style.display = 'flex';

      const now = new Date();
      addResult({ name: currentPlayer.name, phone: currentPlayer.phone, time: finalTime, ms, date: now.toLocaleDateString('ru-RU'), datetime: now.toLocaleString('ru-RU') });
      updateRecordLine();
    }
  });

  document.getElementById('btn-play-again').addEventListener('click', resetGame);
  document.getElementById('btn-change-player').addEventListener('click', () => showScreen('form'));
  document.getElementById('btn-goto-stats2').addEventListener('click', () => { renderStats(); showScreen('stats'); });

  // Stats
  function renderStats() {
    const arr = loadStats();
    statsCount.textContent = arr.length ? `Всего попыток: ${arr.length}` : '';
    if (!arr.length) { statsContainer.innerHTML = '<div class="stats-empty">Пока нет результатов</div>'; return; }
    const sorted = [...arr].sort((a,b) => a.ms - b.ms);
    const bestMs = sorted[0].ms;
    const rows = sorted.map((r,i) => `
      <tr class="${r.ms === bestMs && i === 0 ? 'best-row' : ''}">
        <td>${i+1}</td>
        <td>${escHtml(r.name)}</td>
        <td>${escHtml(r.phone)}</td>
        <td class="time-col">${r.time}${i===0?' 🏆':''}</td>
        <td>${r.date}</td>
      </tr>`).join('');
    statsContainer.innerHTML = `
      <table class="stats-table">
        <thead><tr><th>#</th><th>Имя</th><th>Телефон</th><th>Время</th><th>Дата</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Excel
  document.getElementById('btn-export-xlsx').addEventListener('click', () => {
    const arr = loadStats();
    if (!arr.length) { alert('Нет данных для экспорта!'); return; }
    const sorted = [...arr].sort((a,b) => a.ms - b.ms);
    const wsData = [['#', 'Имя', 'Телефон', 'Время (мм:сс.т)', 'Дата и время']];
    sorted.forEach((r,i) => wsData.push([i+1, r.name, r.phone, r.time, r.datetime]));

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{wch:4},{wch:22},{wch:20},{wch:16},{wch:22}];

    ['A1','B1','C1','D1','E1'].forEach(cell => {
      if (!ws[cell]) return;
      ws[cell].s = { font:{bold:true,color:{rgb:'FFFFFF'}}, fill:{patternType:'solid',fgColor:{rgb:'FF6B1A'}}, alignment:{horizontal:'center'} };
    });

    XLSX.utils.book_append_sheet(wb, ws, 'Статистика ПБ2');
    const d = new Date().toLocaleDateString('ru-RU').replace(/\./g,'-');
    XLSX.writeFile(wb, `pb2_stats_${d}.xlsx`);
  });

  document.getElementById('btn-back-form').addEventListener('click', () => showScreen('form'));
  document.getElementById('btn-clear-stats').addEventListener('click', () => {
    if (confirm('Удалить всю статистику?')) { localStorage.removeItem(STORAGE_KEY); updateRecordLine(); renderStats(); }
  });
</script>
</body>
</html>
